<div class="articles-grid">
  {{ range first 3 (where .Site.RegularPages "Section" "articoli") }}
  <a href="{{ .RelPermalink }}" class="article-card">
    <div class="article-info">
      <h3>{{ .Title }}</h3>
      <p>{{ .Summary | truncate 120 }}</p>
      <span class="read-more">Leggi articolo →</span>
    </div>
  </a>
  {{ end }}
</div>

<style>
.articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.article-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 20px;
    text-decoration: none !important;
    transition: 0.3s ease;
}
.article-card:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: #3b82f6;
    transform: translateY(-5px);
}
.article-card h3 { margin: 0 0 10px 0; color: #fff; font-size: 1.4rem; }
.article-card p { color: #94a3b8; font-size: 0.95rem; line-height: 1.4; margin: 0; }
.read-more { display: block; margin-top: 15px; color: #3b82f6; font-weight: bold; }
</style>
