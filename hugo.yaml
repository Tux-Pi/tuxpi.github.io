# Sostituisci 'tuo-utente' con il tuo nome account GitHub
baseURL: "https://tuo-utente.github.io/tuxpi-site/"
title: "TuxPi"
languageCode: "it-it"

# Importa Hextra come modulo
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # Permette l'HTML personalizzato (necessario per la Home Page gigante)
  goldmark:
    renderer:
      unsafe: true
  # Abilita l'evidenziazione del codice (ottimo per le guide Linux)
  highlight:
    noClasses: false

# Configurazione del Menu Superiore (Navbar)
menu:
  main:
    - name: "Home"
      url: "/"
      weight: 1
    - name: "Articoli"
      url: "/blog"
      weight: 2
    - name: "Sezioni"
      url: "/docs"
      weight: 3
    - name: "Chi Sono"
      url: "/chi-sono"
      weight: 4
    - name: "Cerca"
      weight: 10
      params:
        type: search

params:
  navbar:
    displayTitle: true
    displayLogo: false # Se carichi un logo in static/images/logo.svg metti true
    title: "TuxPi"
    width: "max-w-[1400px]" # Allarga leggermente la barra di navigazione

  footer:
    displayCopyright: true
    displayPoweredBy: false
    text: "© 2026 Progetto TuxPi - Da tuxpi.ddns.net a GitHub"
    width: "max-w-[1400px]"

  # Impostazioni tema
  theme:
    default: "dark" # TuxPi sta benissimo in Dark Mode di default

  # Link di modifica (opzionale, punta al tuo repo)
  editURL:
    enable: false # Disabilitalo se non vuoi il tasto "Edit this page"
